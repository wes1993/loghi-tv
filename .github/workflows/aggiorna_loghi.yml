name: Aggiornamento Automatico Loghi M3U

on:
  schedule:
    - cron: '5 * * * *' 
  workflow_dispatch:
    # Ti permette di avviare lo script manualmente con un click dal sito di GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Permesso fondamentale per permettere all'Action di fare il push nel repo

    steps:
    # 1. Checkout aggiornato all'ultima release compatibile con Node 24
    - name: Checkout del codice del repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # 2. Setup Python aggiornato all'ultima release compatibile con Node 24
    - name: Configurazione di Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Ottimizza i tempi di esecuzione memorizzando le librerie

    - name: Installazione delle dipendenze (Pillow e Requests)
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Esecuzione dello script Python
      run: |
        # Usiamo sed per forzare USER_RUN su False prima di avviare, così non si blocca mai
        sed -i 's/USER_RUN = True/USER_RUN = False/g' scripts/m3u_adjuster.py
        python scripts/m3u_adjuster.py

    - name: Commit e Push dei nuovi loghi e dell'M3U aggiornato
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Aggiungiamo sia i nuovi file png che l'm3u modificato
        git add Loghi-Quadrati/*.png vavoo_quadrato.m3u
        
        # Facciamo il commit solo se ci sono effettivi cambiamenti
        if ! git diff --cached --quiet; then
          git commit -m "🤖 GitHub Action: Aggiornati loghi e playlist M3U"
          git push
        else
          echo "Nessun nuovo logo trovato o generato. Salto il commit."
        fi
